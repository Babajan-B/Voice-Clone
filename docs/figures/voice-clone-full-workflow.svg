<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1460" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="180" x2="1380" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { fill: #F8FAFC; font: 700 38px Arial, Helvetica, sans-serif; }
      .subtitle { fill: #94A3B8; font: 20px Arial, Helvetica, sans-serif; }
      .laneTitle { fill: #E2E8F0; font: 700 24px Arial, Helvetica, sans-serif; }
      .boxTitle { fill: #F8FAFC; font: 700 24px Arial, Helvetica, sans-serif; }
      .boxBody { fill: #CBD5E1; font: 18px Arial, Helvetica, sans-serif; }
      .chip { fill: #DBEAFE; font: 700 16px Arial, Helvetica, sans-serif; }
      .small { fill: #94A3B8; font: 17px Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="40" fill="url(#bg)"/>
  <circle cx="240" cy="160" r="150" fill="#8B5CF6" fill-opacity="0.12" filter="url(#soft)"/>
  <circle cx="1320" cy="180" r="150" fill="#0EA5E9" fill-opacity="0.10" filter="url(#soft)"/>
  <rect x="40" y="40" width="1520" height="900" rx="30" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.12"/>

  <rect x="84" y="74" width="54" height="54" rx="16" fill="url(#accent)"/>
  <text x="162" y="110" class="title">Voice Clone</text>
  <text x="162" y="144" class="subtitle">End-to-end app architecture: capture, transcribe, synthesize, convert, and persist locally</text>

  <rect x="84" y="194" width="1432" height="698" rx="28" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.1"/>

  <line x1="432" y1="214" x2="432" y2="872" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="776" y1="214" x2="776" y2="872" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="1132" y1="214" x2="1132" y2="872" stroke="white" stroke-opacity="0.08" stroke-width="2"/>

  <text x="116" y="246" class="laneTitle">1. User Workflows</text>
  <text x="470" y="246" class="laneTitle">2. Frontend</text>
  <text x="814" y="246" class="laneTitle">3. Backend</text>
  <text x="1170" y="246" class="laneTitle">4. Models + Storage</text>

  <rect x="112" y="286" width="292" height="104" rx="20" fill="white" fill-opacity="0.05" stroke="#C084FC" stroke-opacity="0.45"/>
  <text x="138" y="326" class="boxTitle">Voice Profiles</text>
  <text x="138" y="356" class="boxBody">record or upload a reference clip</text>
  <text x="138" y="382" class="boxBody">save paired audio and transcript</text>

  <rect x="112" y="430" width="292" height="104" rx="20" fill="white" fill-opacity="0.05" stroke="#C084FC" stroke-opacity="0.45"/>
  <text x="138" y="470" class="boxTitle">Transcribe</text>
  <text x="138" y="500" class="boxBody">upload audio or video</text>
  <text x="138" y="526" class="boxBody">receive transcript and subtitle timing</text>

  <rect x="112" y="574" width="292" height="104" rx="20" fill="white" fill-opacity="0.05" stroke="#C084FC" stroke-opacity="0.45"/>
  <text x="138" y="614" class="boxTitle">Synthesize</text>
  <text x="138" y="644" class="boxBody">pick saved voice + enter target text</text>
  <text x="138" y="670" class="boxBody">generate new speech</text>

  <rect x="112" y="718" width="292" height="104" rx="20" fill="white" fill-opacity="0.05" stroke="#C084FC" stroke-opacity="0.45"/>
  <text x="138" y="758" class="boxTitle">Voice Convert</text>
  <text x="138" y="788" class="boxBody">transcribe source media</text>
  <text x="138" y="814" class="boxBody">re-speak it in a saved voice</text>

  <rect x="468" y="326" width="272" height="112" rx="20" fill="white" fill-opacity="0.05" stroke="#A5B4FC" stroke-opacity="0.45"/>
  <text x="494" y="368" class="boxTitle">Next.js Panels</text>
  <text x="494" y="398" class="boxBody">tab shell, forms, recorder, uploads</text>
  <text x="494" y="424" class="boxBody">dark glass UI for all four workflows</text>

  <rect x="468" y="502" width="272" height="112" rx="20" fill="white" fill-opacity="0.05" stroke="#A5B4FC" stroke-opacity="0.45"/>
  <text x="494" y="544" class="boxTitle">Typed API + SSE</text>
  <text x="494" y="574" class="boxBody">POST multipart requests</text>
  <text x="494" y="600" class="boxBody">stream progress and parse final results</text>

  <rect x="468" y="678" width="272" height="112" rx="20" fill="white" fill-opacity="0.05" stroke="#A5B4FC" stroke-opacity="0.45"/>
  <text x="494" y="720" class="boxTitle">Browser Output</text>
  <text x="494" y="750" class="boxBody">show transcript, audio player,</text>
  <text x="494" y="776" class="boxBody">subtitle export, history state</text>

  <rect x="812" y="286" width="284" height="90" rx="20" fill="white" fill-opacity="0.05" stroke="#7DD3FC" stroke-opacity="0.5"/>
  <text x="838" y="324" class="boxTitle">FastAPI Routes</text>
  <text x="838" y="352" class="boxBody">/voices, /transcribe, /generate, /convert</text>

  <rect x="812" y="416" width="284" height="90" rx="20" fill="white" fill-opacity="0.05" stroke="#7DD3FC" stroke-opacity="0.5"/>
  <text x="838" y="454" class="boxTitle">Audio Normalization</text>
  <text x="838" y="482" class="boxBody">convert uploads into a stable WAV path</text>

  <rect x="812" y="546" width="284" height="90" rx="20" fill="white" fill-opacity="0.05" stroke="#7DD3FC" stroke-opacity="0.5"/>
  <text x="838" y="584" class="boxTitle">Model Manager</text>
  <text x="838" y="612" class="boxBody">one heavy model active at a time</text>

  <rect x="812" y="676" width="284" height="90" rx="20" fill="white" fill-opacity="0.05" stroke="#7DD3FC" stroke-opacity="0.5"/>
  <text x="838" y="714" class="boxTitle">ASR / TTS Services</text>
  <text x="838" y="742" class="boxBody">transcript, segments, or generated audio</text>

  <rect x="812" y="806" width="284" height="56" rx="18" fill="white" fill-opacity="0.05" stroke="#7DD3FC" stroke-opacity="0.5"/>
  <text x="838" y="842" class="boxTitle">SSE progress + final result</text>

  <rect x="1168" y="300" width="304" height="118" rx="20" fill="white" fill-opacity="0.05" stroke="#67E8F9" stroke-opacity="0.5"/>
  <text x="1194" y="342" class="boxTitle">saved_voices/</text>
  <text x="1194" y="372" class="boxBody">&lt;name&gt;.wav + &lt;name&gt;.txt</text>
  <text x="1194" y="398" class="boxBody">reusable voice profiles on disk</text>

  <rect x="1168" y="478" width="304" height="118" rx="20" fill="white" fill-opacity="0.05" stroke="#67E8F9" stroke-opacity="0.5"/>
  <text x="1194" y="520" class="boxTitle">faster-whisper</text>
  <text x="1194" y="550" class="boxBody">speech-to-text</text>
  <text x="1194" y="576" class="boxBody">timed segment generation</text>

  <rect x="1168" y="656" width="304" height="118" rx="20" fill="white" fill-opacity="0.05" stroke="#67E8F9" stroke-opacity="0.5"/>
  <text x="1194" y="698" class="boxTitle">Qwen3-TTS</text>
  <text x="1194" y="728" class="boxBody">voice-conditioned speech synthesis</text>
  <text x="1194" y="754" class="boxBody">long-text chunked generation</text>

  <rect x="1168" y="814" width="304" height="78" rx="20" fill="white" fill-opacity="0.05" stroke="#67E8F9" stroke-opacity="0.5"/>
  <text x="1194" y="850" class="boxTitle">generated/ + history</text>
  <text x="1194" y="876" class="boxBody">wav outputs and json metadata</text>

  <path d="M404 338H468" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M404 482H468" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M404 626H468" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M404 770H468" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M740 382H812" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M740 558H812" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M740 734H812" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M954 376V416" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M954 506V546" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M954 636V676" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M954 766V806" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M1096 591H1168" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1096 721H1168" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M1168 359H1128C1114 359 1102 347 1102 333V331H1096" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <path d="M1320 596V642" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M954 862V892H604V790" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <rect x="84" y="900" width="1432" height="40" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1"/>
  <text x="116" y="926" class="small">Outputs returned to the UI: cleaned transcript, subtitle segments, base64 WAV playback, and persistent local history.</text>
</svg>
