<svg width="1400" height="840" viewBox="0 0 1400 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="130" y1="90" x2="1260" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="flow" x1="146" y1="320" x2="1206" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="840" rx="36" fill="url(#bg3)"/>
  <rect x="52" y="52" width="1296" height="736" rx="28" fill="white" fill-opacity="0.035" stroke="white" stroke-opacity="0.12"/>

  <text x="88" y="118" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Request Lifecycle</text>
  <text x="88" y="156" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="22">How uploads move through normalization, inference, SSE progress, and final delivery</text>

  <g>
    <rect x="92" y="250" width="222" height="170" rx="24" fill="white" fill-opacity="0.05" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="126" y="304" fill="#E9D5FF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">1. Upload</text>
    <text x="126" y="344" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">Browser sends `FormData`</text>
    <text x="126" y="372" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">to a POST endpoint.</text>
  </g>

  <g>
    <rect x="360" y="250" width="222" height="170" rx="24" fill="white" fill-opacity="0.05" stroke="#818CF8" stroke-opacity="0.35"/>
    <text x="394" y="304" fill="#E0E7FF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">2. Normalize</text>
    <text x="394" y="344" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">`uploaded_bytes_to_wav()`</text>
    <text x="394" y="372" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">converts WebM, MP3, MP4, etc.</text>
  </g>

  <g>
    <rect x="628" y="250" width="222" height="170" rx="24" fill="white" fill-opacity="0.05" stroke="#60A5FA" stroke-opacity="0.35"/>
    <text x="662" y="304" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">3. Lock + Load</text>
    <text x="662" y="344" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">`model_manager` selects</text>
    <text x="662" y="372" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">ASR or TTS under mutex.</text>
  </g>

  <g>
    <rect x="896" y="250" width="222" height="170" rx="24" fill="white" fill-opacity="0.05" stroke="#38BDF8" stroke-opacity="0.35"/>
    <text x="930" y="304" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">4. Stream</text>
    <text x="930" y="344" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">Progress events are sent</text>
    <text x="930" y="372" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">back as SSE messages.</text>
  </g>

  <g>
    <rect x="1164" y="250" width="160" height="170" rx="24" fill="white" fill-opacity="0.05" stroke="#22D3EE" stroke-opacity="0.35"/>
    <text x="1196" y="304" fill="#CFFAFE" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">5. Result</text>
    <text x="1196" y="344" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">Transcript,</text>
    <text x="1196" y="372" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">segments, or</text>
    <text x="1196" y="400" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">base64 WAV.</text>
  </g>

  <path d="M314 335H360" stroke="url(#flow)" stroke-width="6" stroke-linecap="round"/>
  <path d="M582 335H628" stroke="url(#flow)" stroke-width="6" stroke-linecap="round"/>
  <path d="M850 335H896" stroke="url(#flow)" stroke-width="6" stroke-linecap="round"/>
  <path d="M1118 335H1164" stroke="url(#flow)" stroke-width="6" stroke-linecap="round"/>

  <path d="M344 323L360 335L344 347" fill="none" stroke="url(#flow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M612 323L628 335L612 347" fill="none" stroke="url(#flow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M880 323L896 335L880 347" fill="none" stroke="url(#flow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1148 323L1164 335L1148 347" fill="none" stroke="url(#flow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <rect x="92" y="500" width="1232" height="224" rx="28" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
    <text x="126" y="552" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Endpoint behaviors</text>

    <circle cx="136" cy="600" r="8" fill="#A78BFA"/>
    <text x="160" y="608" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="21">`/api/transcribe` returns cleaned transcript, language info, and timed segments.</text>

    <circle cx="136" cy="644" r="8" fill="#60A5FA"/>
    <text x="160" y="652" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="21">`/api/generate` returns base64 audio in the final SSE event for immediate playback.</text>

    <circle cx="136" cy="688" r="8" fill="#22D3EE"/>
    <text x="160" y="696" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="21">`/api/convert` chains ASR and TTS while preserving the review-first option.</text>
  </g>
</svg>
