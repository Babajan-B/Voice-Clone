  <text x="108" y="240" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700">Clone, transcribe, and convert voices</text>
  <text x="108" y="290" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="28">FastAPI backend, Next.js frontend, streaming progress, and on-disk voice profiles.</text>

  <rect x="108" y="336" width="212" height="52" rx="26" fill="url(#accent)"/>
  <text x="150" y="369" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Local-first workflow</text>

  <rect x="340" y="336" width="170" height="52" rx="26" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.12"/>
  <text x="386" y="369" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">SSE progress</text>

  <rect x="530" y="336" width="198" height="52" rx="26" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.12"/>
  <text x="568" y="369" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Reusable voices</text>

  <g>
    <rect x="788" y="144" width="472" height="560" rx="26" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.14"/>
    <rect x="822" y="184" width="404" height="74" rx="20" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12"/>
    <text x="852" y="228" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Studio Workflows</text>

    <rect x="822" y="286" width="186" height="150" rx="20" fill="white" fill-opacity="0.05" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="850" y="326" fill="#E9D5FF" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Voice Profiles</text>
    <text x="850" y="360" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Record or upload a</text>
    <text x="850" y="386" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">reference clip, then save</text>
    <text x="850" y="412" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">audio + transcript pairs.</text>

    <rect x="1040" y="286" width="186" height="150" rx="20" fill="white" fill-opacity="0.05" stroke="#60A5FA" stroke-opacity="0.35"/>
    <text x="1074" y="326" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Synthesize</text>
    <text x="1074" y="360" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Generate new text in</text>
    <text x="1074" y="386" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">a saved speaking style</text>
    <text x="1074" y="412" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">with controls.</text>

    <rect x="822" y="468" width="186" height="150" rx="20" fill="white" fill-opacity="0.05" stroke="#22D3EE" stroke-opacity="0.35"/>
    <text x="858" y="508" fill="#CFFAFE" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Transcribe</text>
    <text x="858" y="542" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Turn media into clean</text>
    <text x="858" y="568" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">text plus subtitle-ready</text>
    <text x="858" y="594" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">timed segments.</text>

    <rect x="1040" y="468" width="186" height="150" rx="20" fill="white" fill-opacity="0.05" stroke="#38BDF8" stroke-opacity="0.35"/>
    <text x="1064" y="508" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Voice Convert</text>
    <text x="1064" y="542" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Transcribe source audio</text>
    <text x="1064" y="568" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">and respeak it in another</text>
    <text x="1064" y="594" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">saved voice.</text>
