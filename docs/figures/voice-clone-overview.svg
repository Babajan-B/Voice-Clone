  </defs>

  <rect width="1400" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="252" cy="170" r="130" fill="#8B5CF6" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="1180" cy="150" r="140" fill="#2563EB" fill-opacity="0.16" filter="url(#blur)"/>
  <circle cx="1110" cy="650" r="150" fill="#0EA5E9" fill-opacity="0.08" filter="url(#blur)"/>

  <rect x="66" y="58" width="1268" height="704" rx="28" fill="white" fill-opacity="0.035" stroke="white" stroke-opacity="0.12"/>

