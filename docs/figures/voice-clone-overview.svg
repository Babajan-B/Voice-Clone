    <text x="178" y="552" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">One heavy model at a time to reduce memory stalls</text>

    <circle cx="154" cy="590" r="7" fill="#60A5FA"/>
    <text x="178" y="598" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Audio uploads normalized to WAV for browser format compatibility</text>

    <circle cx="154" cy="636" r="7" fill="#22D3EE"/>
    <text x="178" y="644" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Base64 audio delivery avoids an extra generated-file fetch step</text>
