  <rect width="1400" height="920" rx="36" fill="url(#bg2)"/>
  <rect x="56" y="52" width="1288" height="816" rx="28" fill="white" fill-opacity="0.035" stroke="white" stroke-opacity="0.12"/>

  <text x="88" y="118" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Voice Clone Architecture</text>
  <text x="88" y="156" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="22">Frontend and backend responsibilities, storage layout, and model orchestration</text>

  <rect x="88" y="206" width="360" height="608" rx="24" fill="white" fill-opacity="0.05" stroke="#A78BFA" stroke-opacity="0.35"/>
  <text x="122" y="256" fill="#E9D5FF" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Next.js Frontend</text>
  <text x="122" y="294" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="21">Tabs and UI panels</text>

  <rect x="122" y="328" width="292" height="84" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="144" y="360" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Voice Profiles</text>
  <text x="144" y="390" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Reference capture, transcript edit, save/delete</text>

  <rect x="122" y="434" width="292" height="84" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="144" y="466" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Synthesize</text>
  <text x="144" y="496" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">POST-SSE generate workflow and audio playback</text>

  <rect x="122" y="540" width="292" height="84" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="144" y="572" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Transcribe</text>
  <text x="144" y="602" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Transcript view plus SRT / VTT export actions</text>

  <rect x="122" y="646" width="292" height="130" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="144" y="678" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Shared hooks and helpers</text>
  <text x="144" y="708" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">`useSSE`, `useRecorder`, typed API client,</text>
  <text x="144" y="734" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">settings/status hooks, blob URL audio decode</text>

  <rect x="520" y="206" width="360" height="608" rx="24" fill="white" fill-opacity="0.05" stroke="#60A5FA" stroke-opacity="0.35"/>
  <text x="554" y="256" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">FastAPI Backend</text>
  <text x="554" y="294" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="21">Routers and services</text>

  <rect x="554" y="328" width="292" height="96" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="576" y="360" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Routers</text>
  <text x="576" y="390" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">`voices.py`, `inference.py`, `status.py`,</text>
  <text x="576" y="416" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">`history.py`</text>

  <rect x="554" y="446" width="292" height="126" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="576" y="478" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Model manager</text>
  <text x="576" y="508" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Async lock ensures only one heavy model</text>
  <text x="576" y="534" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">is active at a time. Handles load/unload</text>
  <text x="576" y="560" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">for ASR and TTS.</text>

  <rect x="554" y="594" width="292" height="182" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="576" y="626" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Services and utils</text>
  <text x="576" y="656" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">ASR: faster-whisper wrapper</text>
  <text x="576" y="682" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">TTS: Qwen3-TTS wrapper</text>
  <text x="576" y="708" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Audio normalization: uploaded bytes to WAV</text>
  <text x="576" y="734" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Transcript formatting and subtitle builders</text>

  <rect x="952" y="206" width="360" height="608" rx="24" fill="white" fill-opacity="0.05" stroke="#22D3EE" stroke-opacity="0.35"/>
  <text x="986" y="256" fill="#CFFAFE" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Models and Storage</text>
  <text x="986" y="294" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="21">Local artifacts</text>

  <rect x="986" y="328" width="292" height="96" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="1008" y="360" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Qwen3-TTS</text>
  <text x="1008" y="390" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Reference-guided synthesis with chunked</text>
  <text x="1008" y="416" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">long-text generation</text>

  <rect x="986" y="446" width="292" height="96" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="1008" y="478" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">faster-whisper</text>
  <text x="1008" y="508" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Transcription with timed segments</text>
  <text x="1008" y="534" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">and optional language auto-detection</text>

  <rect x="986" y="564" width="292" height="96" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="1008" y="596" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">saved_voices/</text>
  <text x="1008" y="626" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">`&lt;name&gt;.wav` + `&lt;name&gt;.txt`</text>
  <text x="1008" y="652" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Static mount at `/voices-static`</text>

  <rect x="986" y="682" width="292" height="96" rx="18" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <text x="1008" y="714" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">generated/</text>
  <text x="1008" y="744" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Output WAV files plus JSON metadata</text>
  <text x="1008" y="770" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Static mount at `/generated-static`</text>

